<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🎵 MP3 Manager</title>
<style>
:root {
  --bg:       #0f172a;
  --surface:  #1e293b;
  --card:     #263245;
  --border:   #334155;
  --accent:   #38bdf8;
  --accent2:  #818cf8;
  --green:    #4ade80;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --text:     #e2e8f0;
  --muted:    #94a3b8;
  --radius:   12px;
  --font:     'Segoe UI', Tahoma, system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
header h1 { font-size: 17px; font-weight: 700; color: var(--accent); }
header h1 span { color: var(--text); font-weight: 400; font-size: 13px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.status-dot.running { background: var(--green); animation: pulse 1s infinite; }
.status-dot.error   { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

#main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
#sidebar { width: 220px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
@media(max-width:640px){ #sidebar{ width:100%; position:fixed; bottom:0; left:0; right:0; height:auto; border-top:1px solid var(--border); border-left:none; flex-direction:row; overflow-x:auto; z-index:10; padding:4px; } }

.op-btn { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; border: none; background: none; color: var(--text); font-size: 13px; width: 100%; text-align: right; transition: background .15s; border-radius: 0; }
.op-btn:hover { background: var(--card); }
.op-btn.active { background: var(--accent); color: #0f172a; font-weight: 600; border-radius: var(--radius); margin: 2px 6px; width: calc(100% - 12px); }
.op-btn .op-icon { font-size: 16px; flex-shrink: 0; }
.op-btn .op-label { flex: 1; }
.op-pipeline { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 4px; }
.op-pipeline .op-btn { color: var(--accent2); font-weight: 600; }
.op-pipeline .op-btn.active { background: var(--accent2); color: #fff; }

/* ── Content ── */
#content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Folder bar ── */
#folder-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 12px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
#folder-bar input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; color: var(--text); font-size: 13px; direction: ltr; text-align: left; }
#folder-bar input:focus { outline: none; border-color: var(--accent); }
#folder-bar button { background: var(--accent); color: #0f172a; border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-weight: 600; font-size: 13px; }

/* ── Panels ── */
#panels { flex: 1; display: flex; overflow: hidden; }
#params-panel { width: 300px; padding: 14px; overflow-y: auto; background: var(--bg); border-left: 1px solid var(--border); flex-shrink: 0; }
@media(max-width:900px){ #params-panel{ width:100%; border-left:none; border-bottom:1px solid var(--border); max-height:45%; } }
#log-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#log-header { padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
#log-header span { font-size: 12px; color: var(--muted); }
#log-output { flex: 1; overflow-y: auto; padding: 10px 14px; font-family: 'Courier New', monospace; font-size: 12.5px; line-height: 1.6; direction: ltr; text-align: left; background: #080f1a; }
#log-output .log-line { padding: 1px 0; }
.log-ok    { color: var(--green); }
.log-err   { color: var(--red); }
.log-warn  { color: var(--yellow); }
.log-info  { color: var(--muted); }
.log-head  { color: var(--accent); font-weight: bold; }

/* ── File list ── */
#file-list { padding: 0 14px 14px; }
#file-list h3 { font-size: 12px; color: var(--muted); padding: 10px 0 6px; text-transform: uppercase; letter-spacing: .05em; }
.file-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: rtl; }
.file-meta { color: var(--muted); font-size: 11px; white-space: nowrap; }
.file-status { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.file-status.done  { background: var(--green); }
.file-status.error { background: var(--red); }

/* ── Params ── */
.param-section { margin-bottom: 16px; }
.param-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing:.05em; margin-bottom: 6px; display: block; }
.param-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.param-chip { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: all .15s; user-select: none; }
.param-chip.selected, .param-chip:hover { background: var(--accent); color: #0f172a; border-color: var(--accent); font-weight: 600; }
.param-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text); font-size: 13px; }
.param-input:focus { outline: none; border-color: var(--accent); }
select.param-input { cursor: pointer; }

/* ── Pipeline stages ── */
.stage-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--card); border-radius: 8px; margin-bottom: 6px; }
.stage-toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--border); cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; }
.stage-toggle.on { background: var(--accent); }
.stage-toggle::after { content:''; position:absolute; top:3px; right:3px; width:14px; height:14px; border-radius:50%; background:#fff; transition: transform .2s; }
.stage-toggle.on::after { transform: translateX(-16px); }
.stage-name { flex:1; font-size:13px; }
.stage-status { font-size: 11px; color: var(--muted); }
.stage-status.ok   { color: var(--green); }
.stage-status.err  { color: var(--red); }
.stage-status.skip { color: var(--muted); }

/* ── Run button ── */
#run-btn { width: 100%; padding: 12px; background: var(--green); color: #052e16; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px; transition: all .2s; }
#run-btn:hover { filter: brightness(1.1); }
#run-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
#cancel-btn { width: 100%; padding: 9px; background: var(--red); color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 6px; display: none; }
#cancel-btn.visible { display: block; }
.dry-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.dry-row label { font-size: 13px; color: var(--muted); cursor: pointer; }

/* ── Folder info pills ── */
#folder-info { padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.info-pill { background: var(--card); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--muted); }
.info-pill strong { color: var(--text); }
.warn-pill { background: #422006; color: var(--yellow); border: 1px solid #92400e; border-radius: 20px; padding: 3px 10px; font-size: 11px; }

/* ── Progress bar ── */
#progress-bar { height: 6px; background: var(--border); flex-shrink: 0; border-radius: 3px; position: relative; }
#progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width .3s; border-radius: 3px; }
#progress-fill.indeterminate { animation: slide 1.5s infinite; width: 30%; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
@keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }

/* ── Live status banner ── */
#live-status { display: none; background: linear-gradient(135deg, #1e293b 0%, #1a2744 100%); border-bottom: 2px solid var(--accent); padding: 12px 16px; flex-shrink: 0; }
#live-status.active { display: block; animation: fadeIn .3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
#live-stage { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
#live-file { font-size: 13px; color: var(--text); margin-bottom: 8px; direction: ltr; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 6px 10px; background: var(--card); border-radius: 6px; border-right: 3px solid var(--accent); }
#live-bar-wrap { height: 14px; background: var(--card); border-radius: 7px; overflow: hidden; position: relative; }
#live-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .3s; border-radius: 7px; }
#live-bar-wrap.indeterminate #live-bar-fill { animation: slide 1.5s infinite; width: 30%; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
#live-pct { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); font-size: 10px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.5); }
#live-counter { font-size: 12px; color: var(--muted); margin-top: 6px; display: flex; justify-content: space-between; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── Toast ── */
#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; }
#toast.show { opacity: 1; }

/* ── Browse modal ── */
#browse-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 300; align-items: center; justify-content: center; }
#browse-overlay.open { display: flex; }
#browse-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: min(520px, 96vw); max-height: 82vh; display: flex; flex-direction: column; box-shadow: 0 24px 60px rgba(0,0,0,.5); }
#browse-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
#browse-header strong { font-size: 14px; }
#browse-crumb { flex: 1; font-size: 11px; color: var(--muted); direction: ltr; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#browse-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }
#browse-list { overflow-y: auto; flex: 1; padding: 6px 8px; }
.browse-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: background .1s; direction: ltr; }
.browse-item:hover { background: var(--card); }
.browse-item .bi-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
.browse-item .bi-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.browse-item.bi-parent { color: var(--muted); }
.browse-item.bi-select { background: rgba(56,189,248,.12); border: 1px solid var(--accent); color: var(--accent); font-weight: 600; margin-bottom: 4px; }
.browse-item.bi-select:hover { background: rgba(56,189,248,.2); }
#browse-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
#browse-select-btn { background: var(--green); color: #052e16; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer; }
#browse-cancel-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">

<!-- Header -->
<header>
  <div class="status-dot" id="status-dot"></div>
  <h1>🎵 MP3 Manager <span id="running-label"></span></h1>
  <div style="margin-right:auto"></div>
  <span style="font-size:11px;color:var(--muted)" id="server-url"></span>
</header>

<!-- Folder bar -->
<div id="folder-bar">
  <input type="text" id="folder-input" list="folder-history"
         placeholder="/storage/self/primary/Music" value=""
         onkeydown="if(event.key==='Enter') loadFolder()" />
  <datalist id="folder-history"></datalist>
  <button onclick="openBrowse()" style="background:var(--card);color:var(--text);border:1px solid var(--border)">🗂 Browse</button>
  <button onclick="loadFolder()">📂 فتح</button>
</div>

<!-- Folder info -->
<div id="folder-info">
  <span class="info-pill">انتظار...</span>
</div>

<!-- Copy notice -->
<div id="copy-notice" style="display:none;background:linear-gradient(90deg,#052e16,#0d2d1a);border-bottom:2px solid var(--green);padding:7px 14px;font-size:12px;display:none;align-items:center;gap:8px;flex-shrink:0">
  <span style="color:var(--green);font-weight:700">🛡 النسخة:</span>
  <span id="copy-path" style="color:var(--text);direction:ltr;font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
  <button onclick="navigateToCopy()" style="background:var(--green);color:#052e16;border:none;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer">فتح</button>
</div>

<!-- Progress -->
<div id="progress-bar"><div id="progress-fill"></div></div>

<!-- Live status banner -->
<div id="live-status">
  <div id="live-stage"></div>
  <div id="live-file"></div>
  <div id="live-bar-wrap">
    <div id="live-bar-fill"></div>
    <span id="live-pct"></span>
  </div>
  <div id="live-counter">
    <span id="live-counter-text"></span>
    <span id="live-elapsed"></span>
  </div>
</div>

<!-- Main -->
<div id="main">

  <!-- Content -->
  <div id="content">
    <div id="panels">
      <!-- Params -->
      <div id="params-panel">
        <div id="params-content">
          <!-- Filled by JS -->
        </div>
        <button id="run-btn" onclick="runOperation()">▶ تشغيل</button>
        <button id="cancel-btn" onclick="cancelRun()">■ إيقاف</button>
        <div class="dry-row">
          <input type="checkbox" id="make-copy" />
          <label for="make-copy">إنشاء نسخة أولاً (موصى به)</label>
        </div>
        <div class="dry-row">
          <input type="checkbox" id="recursive" />
          <label for="recursive">تضمين المجلدات الفرعية (Recursive)</label>
        </div>
        <div class="dry-row">
          <input type="checkbox" id="dry-run" />
          <label for="dry-run">Dry Run (معاينة بدون تغيير)</label>
        </div>
      </div>

      <!-- Log -->
      <div id="log-panel">
        <div id="log-header">
          <strong style="font-size:13px">📋 السجل</strong>
          <div style="display:flex;gap:8px;align-items:center">
            <span id="log-count">0 سطر</span>
            <button onclick="downloadLog()" title="تحميل السجل" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px">⬇ سجل</button>
            <button onclick="clearLog()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px">مسح</button>
          </div>
        </div>
        <div id="log-output"></div>
        <div id="file-list"></div>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="op-pipeline">
      <button class="op-btn" data-op="pipeline" onclick="selectOp('pipeline')">
        <span class="op-icon">⚡</span>
        <span class="op-label">Pipeline</span>
      </button>
    </div>
    <button class="op-btn" data-op="rename" onclick="selectOp('rename')">
      <span class="op-icon">✏️</span><span class="op-label">Rename & Arrange</span>
    </button>
    <button class="op-btn" data-op="compress" onclick="selectOp('compress')">
      <span class="op-icon">📦</span><span class="op-label">Compress</span>
    </button>
    <button class="op-btn" data-op="speed" onclick="selectOp('speed')">
      <span class="op-icon">⏩</span><span class="op-label">Speed</span>
    </button>
    <button class="op-btn" data-op="split" onclick="selectOp('split')">
      <span class="op-icon">✂️</span><span class="op-label">Split</span>
    </button>
    <button class="op-btn" data-op="silence" onclick="selectOp('silence')">
      <span class="op-icon">🔇</span><span class="op-label">Remove Silence</span>
    </button>
    <button class="op-btn" data-op="convert" onclick="selectOp('convert')">
      <span class="op-icon">🔄</span><span class="op-label">Convert → MP3</span>
    </button>
    <button class="op-btn" data-op="merge" onclick="selectOp('merge')">
      <span class="op-icon">🔗</span><span class="op-label">Merge</span>
    </button>
    <button class="op-btn" data-op="csv" onclick="selectOp('csv')">
      <span class="op-icon">📊</span><span class="op-label">Export CSV</span>
    </button>
    <button class="op-btn" data-op="series" onclick="selectOp('series')">
      <span class="op-icon">📚</span><span class="op-label">Series Detection</span>
    </button>
    <button class="op-btn" data-op="normalize" onclick="selectOp('normalize')">
      <span class="op-icon">🔊</span><span class="op-label">Normalize Volume</span>
    </button>
    <button class="op-btn" data-op="batch_folders" onclick="selectOp('batch_folders')">
      <span class="op-icon">📂⚡</span><span class="op-label">Batch by Name</span>
    </button>
  </div>
</div>

</div><!-- #app -->

<!-- Browse Modal -->
<div id="browse-overlay" onclick="if(event.target===this) closeBrowse()">
  <div id="browse-box">
    <div id="browse-header">
      <strong>🗂 اختر مجلداً</strong>
      <span id="browse-crumb"></span>
      <button id="browse-close" onclick="closeBrowse()">✕</button>
    </div>
    <div id="browse-list"></div>
    <div id="browse-footer">
      <button id="browse-cancel-btn" onclick="closeBrowse()">إلغاء</button>
      <button id="browse-select-btn" onclick="selectBrowseFolder()">✓ اختر هذا المجلد</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API = window.location.origin;
let currentOp = 'compress';
let currentFolder = localStorage.getItem('mp3_folder') || '';
let isRunning = false;
let eventSource = null;
let logLines = 0;
let prefs = {};
let _presets = {};
let _logBuffer = [];
let _startTime = 0;
let _elapsedTimer = null;

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('server-url').textContent = API;
  document.getElementById('folder-input').value = currentFolder;

  // Load prefs
  try {
    const r = await fetch(`${API}/api/prefs`);
    prefs = await r.json();
  } catch(e) { prefs = {}; }

  // Load presets
  try {
    const r = await fetch(`${API}/api/presets`);
    _presets = await r.json();
  } catch(e) { _presets = {}; }

  // Populate folder history datalist
  initHistory();

  document.getElementById('recursive').addEventListener('change', () => {
    if (currentFolder) loadFolder();
  });

  selectOp('compress');
  if (currentFolder) loadFolder();

  // Poll status
  setInterval(pollStatus, 3000);
});

// ── Folder ────────────────────────────────────────────────────────────────────
async function loadFolder() {
  const path = document.getElementById('folder-input').value.trim();
  if (!path) return;
  currentFolder = path;
  localStorage.setItem('mp3_folder', path);

  document.getElementById('folder-info').innerHTML = '<span class="info-pill">جاري التحميل...</span>';
  document.getElementById('copy-notice').style.display = 'none';

  try {
    const rec = document.getElementById('recursive').checked;
    const r = await fetch(`${API}/api/folder/info?path=${encodeURIComponent(path)}&recursive=${rec}`);
    const d = await r.json();

    if (d.error) {
      document.getElementById('folder-info').innerHTML =
        `<span class="warn-pill">⚠ ${d.error}</span>`;
      return;
    }

    const pills = [
      `<span class="info-pill"><strong>${d.mp3_count}</strong> MP3</span>`,
      `<span class="info-pill"><strong>${d.other_media_count}</strong> ملفات أخرى</span>`,
      `<span class="info-pill"><strong>${d.subfolder_count}</strong> مجلد</span>`,
    ];
    if (!d.ffmpeg_ok)
      pills.push('<span class="warn-pill">⚠ ffmpeg غير موجود</span>');
    if (d.mp3_count === 0 && d.other_media_count === 0)
      pills.push(`<span class="warn-pill">⚠ لا توجد ملفات — ${d.summary}</span>`);

    document.getElementById('folder-info').innerHTML = pills.join('');

    // Save to history
    addToHistory(path);

    // File list
    renderFileList(d.mp3_files, d.other_files, d.subfolders);
  } catch(e) {
    document.getElementById('folder-info').innerHTML =
      `<span class="warn-pill">⚠ لا يمكن الاتصال بالسيرفر: ${e.message}</span>`;
  }
}

// ── Folder Browser ───────────────────────────────────────────────────────────
let _browseCurrent = '/';

async function openBrowse() {
  const start = document.getElementById('folder-input').value.trim();
  _browseCurrent = start || '/';
  document.getElementById('browse-overlay').classList.add('open');
  await loadBrowseDir(_browseCurrent);
}

function closeBrowse() {
  document.getElementById('browse-overlay').classList.remove('open');
}

function selectBrowseFolder() {
  document.getElementById('folder-input').value = _browseCurrent;
  closeBrowse();
  loadFolder();
}

async function loadBrowseDir(path) {
  _browseCurrent = path;
  document.getElementById('browse-crumb').textContent = path;

  const listEl = document.getElementById('browse-list');
  listEl.innerHTML = '<div style="color:var(--muted);padding:16px;text-align:center">جاري التحميل...</div>';

  try {
    const r = await fetch(`${API}/api/folder/browse?path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if (d.error) {
      listEl.innerHTML = `<div style="color:var(--red);padding:16px">${d.error}</div>`;
      return;
    }

    let html = '';

    // "Select this folder" shortcut at top
    html += `<div class="browse-item bi-select" onclick="selectBrowseFolder()">
      <span class="bi-icon">✓</span>
      <span class="bi-name">${d.current === '/' ? '/ (root)' : d.current.split('/').pop() || d.current}</span>
      <span style="font-size:11px;color:inherit;opacity:.7">اختر هذا</span>
    </div>`;

    // Parent
    if (d.parent !== d.current) {
      html += `<div class="browse-item bi-parent" onclick="loadBrowseDir('${esc(d.parent)}')">
        <span class="bi-icon">⬆</span>
        <span class="bi-name">.. (رجوع)</span>
      </div>`;
    }

    // Subdirectories
    if (d.dirs.length === 0) {
      html += '<div style="color:var(--muted);padding:12px 10px;font-size:12px">لا توجد مجلدات فرعية</div>';
    } else {
      d.dirs.forEach(dir => {
        html += `<div class="browse-item" onclick="loadBrowseDir('${esc(dir.path)}')">
          <span class="bi-icon">📁</span>
          <span class="bi-name">${dir.name}</span>
          <span style="font-size:11px;color:var(--muted)">›</span>
        </div>`;
      });
    }

    listEl.innerHTML = html;
    document.getElementById('browse-crumb').textContent = d.current;
  } catch(e) {
    listEl.innerHTML = `<div style="color:var(--red);padding:16px">خطأ: ${e.message}</div>`;
  }
}

function navigateToCopy() {
  const path = document.getElementById('copy-path').textContent;
  if (path) {
    document.getElementById('folder-input').value = path;
    loadFolder();
  }
}

function esc(path) {
  // Escape single quotes for inline onclick
  return path.replace(/'/g, "\\'");
}

// ── History ───────────────────────────────────────────────────────────────────
function initHistory() {
  const hist = JSON.parse(localStorage.getItem('mp3_history') || '[]');
  const dl = document.getElementById('folder-history');
  dl.innerHTML = hist.map(p => `<option value="${p}">`).join('');
}

function addToHistory(path) {
  let hist = JSON.parse(localStorage.getItem('mp3_history') || '[]');
  hist = hist.filter(p => p !== path);
  hist.unshift(path);
  hist = hist.slice(0, 10);
  localStorage.setItem('mp3_history', JSON.stringify(hist));
  initHistory();
}

// ── Presets ───────────────────────────────────────────────────────────────────
async function savePresetUI() {
  const name = document.getElementById('save-preset-name')?.value?.trim();
  if (!name) { toast('أدخل اسماً للإعداد'); return; }
  const params = getParams();
  try {
    await fetch(`${API}/api/presets/${encodeURIComponent(name)}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(params),
    });
    _presets[name] = params;
    toast(`✓ تم حفظ الإعداد: ${name}`);
    if (currentOp === 'pipeline') selectOp('pipeline'); // re-render
  } catch(e) { toast('خطأ في حفظ الإعداد'); }
}

function loadPresetUI() {
  const name = document.getElementById('preset-select')?.value;
  if (!name || !_presets[name]) { toast('اختر إعداداً أولاً'); return; }
  const p = _presets[name];
  // Apply stages
  ['convert','compress','speed','silence','rename'].forEach(k => {
    const el = document.getElementById(`stage_${k}`);
    if (!el) return;
    const should = p.stages?.[k] ?? false;
    if (should) el.classList.add('on'); else el.classList.remove('on');
  });
  // Apply numeric values
  if (p.bitrate)       { document.getElementById('bitrate').value = p.bitrate; }
  if (p.speed)         { document.getElementById('speed').value = p.speed; }
  if (p.silence_sec)   { document.getElementById('silence_sec').value = p.silence_sec; }
  if (p.number_action) { document.getElementById('number_action_pl').value = p.number_action; }
  toast(`✓ تم تحميل: ${name}`);
}

async function deletePresetUI() {
  const name = document.getElementById('preset-select')?.value;
  if (!name) { toast('اختر إعداداً للحذف'); return; }
  try {
    await fetch(`${API}/api/presets/${encodeURIComponent(name)}`, { method: 'DELETE' });
    delete _presets[name];
    toast(`تم حذف: ${name}`);
    if (currentOp === 'pipeline') selectOp('pipeline');
  } catch(e) { toast('خطأ في الحذف'); }
}

// ── Log download ──────────────────────────────────────────────────────────────
function downloadLog() {
  if (_logBuffer.length === 0) { toast('لا يوجد سجل للتحميل'); return; }
  const text = _logBuffer.join('\n');
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mp3manager_log_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function safeId(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return 'fs_' + Math.abs(h).toString(36);
}

function renderFileList(mp3s, others, dirs) {
  const el = document.getElementById('file-list');
  let html = '';

  if (dirs.length) {
    html += '<h3>📁 مجلدات فرعية</h3>';
    dirs.forEach(d => {
      html += `<div class="file-item">
        <span class="file-name" style="cursor:pointer;color:var(--accent)"
          onclick="navigateTo('${d.path || d.name}')">${d.name}/</span>
        <span class="file-meta">${d.mtime||''}</span></div>`;
    });
  }

  if (mp3s.length) {
    html += '<h3>🎵 ملفات MP3</h3>';
    mp3s.forEach(f => {
      html += `<div class="file-item">
        <div class="file-status" id="${safeId(f.name)}"></div>
        <span class="file-name" title="${f.name}">${f.name}</span>
        <span class="file-meta">${f.duration||''} ${f.size_human}</span></div>`;
    });
  }

  if (others.length) {
    html += '<h3>🎬 ملفات أخرى</h3>';
    others.forEach(f => {
      html += `<div class="file-item">
        <span class="file-name">${f.name}</span>
        <span class="file-meta">${f.ext}</span></div>`;
    });
  }

  el.innerHTML = html;
}

function navigateTo(name) {
  const current = document.getElementById('folder-input').value.trim();
  const newPath = current.endsWith('/') ? current + name : current + '/' + name;
  document.getElementById('folder-input').value = newPath;
  loadFolder();
}

// ── Operation selector ────────────────────────────────────────────────────────
function selectOp(op) {
  currentOp = op;
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-op="${op}"]`);
  if (btn) btn.classList.add('active');
  renderParams(op);
}

// ── Params renderer ───────────────────────────────────────────────────────────
const BITRATES = [32, 48, 64, 96, 128, 192, 320];
const SPEEDS   = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
const DURATIONS = ['5m','10m','15m','20m','30m','45m','1h'];

function chips(id, values, defaultVal, fmt=v=>v) {
  const val = prefs[id] || defaultVal;
  return `<div class="param-row">${values.map(v =>
    `<div class="param-chip ${String(v)===String(val)?'selected':''}"
      onclick="selectChip(this,'${id}','${v}')">${fmt(v)}</div>`
  ).join('')}</div>
  <input class="param-input" id="${id}" value="${val}" placeholder="أو اكتب قيمة..."
    style="margin-top:4px" oninput="unselectChips('${id}')">`;
}

function selectChip(el, id, val) {
  el.closest('.param-section').querySelectorAll('.param-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById(id).value = val;
}
function unselectChips(id) {
  document.querySelectorAll(`[onclick*="'${id}'"]`).forEach(c=>c.classList.remove('selected'));
}

function toggle(id) {
  const el = document.getElementById(id);
  el.classList.toggle('on');
}
function isOn(id) { return document.getElementById(id)?.classList.contains('on'); }

      `<option value="${n}">${n}</option>`

    <div class="param-section">
      <span class="param-label">إعدادات محفوظة</span>
      <div style="display:flex;gap:6px">

// ── Build params from UI ──────────────────────────────────────────────────────
function getParams() {
  const g = id => document.getElementById(id)?.value;
  const gn = id => parseFloat(g(id)) || 0;

  if (currentOp === 'pipeline') {
    return {
      stages: {
        convert:  isOn('stage_convert'),
        compress: isOn('stage_compress'),
        speed:    isOn('stage_speed'),
        silence:  isOn('stage_silence'),
        rename:   isOn('stage_rename'),
      },
      bitrate:       gn('bitrate') || prefs.default_bitrate || 64,
      convert_bitrate: gn('bitrate') || prefs.default_bitrate || 128,
      speed:         gn('speed')   || prefs.default_speed   || 1.25,
      silence_sec:   gn('silence_sec') || prefs.silence_threshold_sec || 0.5,
      silence_db:    gn('silence_db')  || prefs.silence_db  || -40,
      number_action: g('number_action_pl') || prefs.number_action || '3',
    };
  }

  const map = {
    rename:    { number_action: g('number_action') },
    compress:  { bitrate: gn('bitrate') },
    speed:     { speed:   gn('speed')   },
    split:     { split_dur: g('split_dur'), after_split: g('after_split') },
    silence:   { silence_sec: gn('silence_sec'), silence_db: gn('silence_db') },
    convert:   { bitrate: gn('bitrate') },
    merge:     { merge_gap: gn('merge_gap') },
    normalize:     { preset: g('normalize_preset') || '1' },
    batch_folders: {
      do_silence:  isOn('do_silence_toggle'),
      silence_sec: gn('silence_sec') || prefs.silence_threshold_sec || 0.5,
      silence_db:  gn('silence_db')  || prefs.silence_db || -40,
    },
    csv:    {},
    series: {},
  };
  return map[currentOp] || {};
}

// ── Run ───────────────────────────────────────────────────────────────────────
async function runOperation() {
  if (isRunning) return;
  const folder = document.getElementById('folder-input').value.trim();
  if (!folder) { toast('حدد مجلد أولاً'); return; }

  clearLog();
  setRunning(true);

  const params = getParams();
  params.recursive  = document.getElementById('recursive').checked;
  params.make_copy  = document.getElementById('make-copy').checked;
  const payload = {
    operation: currentOp,
    folder:    folder,
    params:    params,
    dry_run:   document.getElementById('dry-run').checked,
  };

  try {
    const r = await fetch(`${API}/api/run`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (d.error) { appendLog(`✗ ${d.error}`, 'err'); setRunning(false); return; }
    appendLog(`▶ بدء: ${currentOp}`, 'head');
    startSSE();
  } catch(e) {
    appendLog(`✗ تعذر الاتصال: ${e.message}`, 'err');
    setRunning(false);
  }
}

async function cancelRun() {
  await fetch(`${API}/api/cancel`, {method:'POST'});
  appendLog('■ طلب إيقاف...', 'warn');
}

// ── SSE stream ────────────────────────────────────────────────────────────────
function startSSE() {
  if (eventSource) { eventSource.close(); }
  eventSource = new EventSource(`${API}/api/stream`);

  eventSource.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'ping') return;
    if (msg.type === 'log' ) { appendLog(msg.text); return; }
    if (msg.type === 'progress') {
      const pct = Math.round((msg.current / msg.total) * 100);
      // Top thin bar
      const fill = document.getElementById('progress-fill');
      fill.className = '';
      fill.style.width = pct + '%';
      // Live banner
      document.getElementById('live-file').textContent = msg.filename;
      document.getElementById('live-bar-fill').style.width = pct + '%';
      document.getElementById('live-bar-wrap').className = '';
      document.getElementById('live-pct').textContent = pct + '%';
      document.getElementById('live-counter-text').textContent =
        `${msg.current} / ${msg.total}`;
      // Header
      document.getElementById('running-label').textContent =
        `  ⏳ [${msg.current}/${msg.total}] ${msg.filename}`;
      return;
    }
    if (msg.type === 'stage') {
      appendLog(`\n━━ [${msg.current}/${msg.total}] ${msg.name} ━━`, 'head');
      // Live banner
      document.getElementById('live-stage').textContent =
        `${msg.name}  (${msg.current}/${msg.total})`;
      document.getElementById('live-file').textContent = 'جاري البدء...';
      document.getElementById('live-bar-fill').style.width = '0%';
      document.getElementById('live-bar-wrap').className = 'indeterminate';
      document.getElementById('live-pct').textContent = '';
      document.getElementById('live-counter-text').textContent = '';
      // Header + top bar
      const fill = document.getElementById('progress-fill');
      fill.className = 'indeterminate';
      fill.style.width = '';
      document.getElementById('running-label').textContent =
        `  ⏳ ${msg.name} (${msg.current}/${msg.total})`;
      return;
    }
    if (msg.type === 'copy') {
      const el = document.getElementById('copy-notice');
      document.getElementById('copy-path').textContent = msg.path;
      el.style.display = 'flex';
      appendLog(`🛡 النسخة: ${msg.path}`, 'ok');
      return;
    }
    if (msg.type === 'done') {
      appendLog(`✓ اكتمل في ${msg.elapsed}s`, 'ok');
      if (msg.copy_path) {
        const el = document.getElementById('copy-notice');
        document.getElementById('copy-path').textContent = msg.copy_path;
        el.style.display = 'flex';
      }
      setRunning(false);
      // Navigate to the copy so user sees results
      if (msg.copy_path) {
        document.getElementById('folder-input').value = msg.copy_path;
      }
      loadFolder();
      eventSource.close();
    }
  };
  eventSource.onerror = () => {
    if (!isRunning) return;
    appendLog('⚠ انقطع الاتصال بالسيرفر', 'warn');
    setRunning(false);
  };
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function appendLog(text, cls='') {
  const el = document.getElementById('log-output');
  const line = document.createElement('div');
  line.className = 'log-line';

  // Detect style from rich markup or keywords
  const t = text.toLowerCase();
  if (!cls) {
    if (text.includes('[green]') || t.startsWith('✓') || t.includes('done') || t.includes('succeeded'))
      cls = 'ok';
    else if (text.includes('[red]') || t.startsWith('✗') || t.includes('error') || t.includes('fail'))
      cls = 'err';
    else if (text.includes('[yellow]') || t.startsWith('⚠') || t.includes('warn') || t.includes('skip'))
      cls = 'warn';
    else if (text.includes('[cyan]') || text.includes('──') || text.startsWith('▶'))
      cls = 'head';
    else if (text.startsWith('→') || text.includes('[dim]'))
      cls = 'info';
  }

  // Strip rich markup tags for display
  const clean = text.replace(/\[\/?\w+\]/g, '').replace(/\[\/?\w+ \w+=.*?\]/g, '');
  line.className = `log-line ${cls ? 'log-'+cls : ''}`;
  line.textContent = clean;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  logLines++;
  _logBuffer.push(clean);
  document.getElementById('log-count').textContent = logLines + ' سطر';
}

function clearLog() {
  document.getElementById('log-output').innerHTML = '';
  logLines = 0;
  _logBuffer = [];
  document.getElementById('log-count').textContent = '0 سطر';
}

function setRunning(running) {
  isRunning = running;
  document.getElementById('run-btn').disabled = running;
  document.getElementById('cancel-btn').classList.toggle('visible', running);
  document.getElementById('status-dot').className = 'status-dot' + (running ? ' running' : '');
  document.getElementById('running-label').textContent = running ? `  ⏳ ${currentOp}` : '';
  const fill = document.getElementById('progress-fill');
  fill.className = running ? 'indeterminate' : '';
  fill.style.width = running ? '' : '0%';

  // Live status banner
  const liveEl = document.getElementById('live-status');
  if (running) {
    liveEl.classList.add('active');
    document.getElementById('live-stage').textContent = currentOp;
    document.getElementById('live-file').textContent = 'جاري البدء...';
    document.getElementById('live-bar-fill').style.width = '0%';
    document.getElementById('live-pct').textContent = '';
    document.getElementById('live-counter-text').textContent = '';
    // Elapsed timer
    _startTime = Date.now();
    if (_elapsedTimer) clearInterval(_elapsedTimer);
    _elapsedTimer = setInterval(() => {
      const sec = Math.floor((Date.now() - _startTime) / 1000);
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      document.getElementById('live-elapsed').textContent =
        m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `${s}s`;
    }, 1000);
  } else {
    if (_elapsedTimer) { clearInterval(_elapsedTimer); _elapsedTimer = null; }
    // Show completion briefly, then hide
    document.getElementById('live-file').textContent = '✓ اكتمل';
    document.getElementById('live-bar-fill').style.width = '100%';
    document.getElementById('live-pct').textContent = '100%';
    setTimeout(() => liveEl.classList.remove('active'), 4000);
  }
}

async function pollStatus() {
  try {
    const r = await fetch(`${API}/api/status`);
    const d = await r.json();
    if (d.running && !isRunning) {
      isRunning = true;
      setRunning(true);
      startSSE();
    }
  } catch(e) { /* server offline */ }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
