<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<title>🎵 MP3 Manager</title>
<style>
:root {
  --bg:       #0b1120;
  --surface:  #151d2e;
  --card:     #1c2640;
  --border:   #2a3550;
  --accent:   #60a5fa;
  --accent2:  #a78bfa;
  --green:    #34d399;
  --red:      #fb7185;
  --yellow:   #fbbf24;
  --text:     #e8edf5;
  --muted:    #8896ab;
  --radius:   14px;
  --font:     'Segoe UI', 'Noto Sans Arabic', Tahoma, system-ui, sans-serif;
  --glass:    rgba(255,255,255,.04);
  --shadow:   0 2px 12px rgba(0,0,0,.25);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; -webkit-font-smoothing: antialiased; }
::selection { background: var(--accent); color: var(--bg); }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
header { background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
header h1 { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -.02em; }
header h1 span { -webkit-text-fill-color: var(--text); font-weight: 400; font-size: 13px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.status-dot.running { background: var(--green); animation: pulse 1s infinite; }
.status-dot.error   { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

#main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
#sidebar { width: 220px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
@media(max-width:640px){ #sidebar{ width:100%; position:fixed; bottom:0; left:0; right:0; height:auto; border-top:1px solid var(--border); border-left:none; flex-direction:row; overflow-x:auto; z-index:10; padding:4px; } }

.op-btn { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; border: none; background: none; color: var(--text); font-size: 13px; width: 100%; text-align: right; transition: all .2s; border-radius: 0; }
.op-btn:hover { background: var(--glass); transform: translateX(-2px); }
.op-btn.active { background: linear-gradient(135deg, var(--accent), #2563eb); color: #fff; font-weight: 600; border-radius: var(--radius); margin: 2px 6px; width: calc(100% - 12px); box-shadow: 0 4px 16px rgba(96,165,250,.25); }
.op-btn .op-icon { font-size: 16px; flex-shrink: 0; }
.op-btn .op-label { flex: 1; }
.op-pipeline { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 4px; }
.op-pipeline .op-btn { color: var(--accent2); font-weight: 600; }
.op-pipeline .op-btn.active { background: var(--accent2); color: #fff; }

/* ── Content ── */
#content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Folder bar ── */
#folder-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 12px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
#folder-bar input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; color: var(--text); font-size: 13px; direction: ltr; text-align: left; }
#folder-bar input:focus { outline: none; border-color: var(--accent); }
#folder-bar button { background: var(--accent); color: #0f172a; border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-weight: 600; font-size: 13px; }

/* ── Panels ── */
#panels { flex: 1; display: flex; overflow: hidden; }
#params-panel { width: 300px; padding: 14px; overflow-y: auto; background: var(--bg); border-left: 1px solid var(--border); flex-shrink: 0; }
@media(max-width:900px){ #params-panel{ width:100%; border-left:none; border-bottom:1px solid var(--border); max-height:45%; } }
#log-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#log-header { padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
#log-header span { font-size: 12px; color: var(--muted); }
#log-output { flex: 1; overflow-y: auto; padding: 10px 14px; font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 12px; line-height: 1.7; direction: ltr; text-align: left; background: #060c18; }
#log-panel.collapsed #log-output { display: none; }
#log-panel.collapsed #file-list { display: none; }
#log-panel.collapsed { flex: 0 0 auto; }
#log-output .log-line { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,.02); }
.log-ok    { color: var(--green); }
.log-err   { color: var(--red); }
.log-warn  { color: var(--yellow); }
.log-info  { color: var(--muted); }
.log-head  { color: var(--accent); font-weight: bold; padding: 4px 0; }

/* ── File list ── */
#file-list { padding: 0 14px 14px; }
#file-list h3 { font-size: 12px; color: var(--muted); padding: 10px 0 6px; text-transform: uppercase; letter-spacing: .05em; }
.file-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: rtl; }
.file-meta { color: var(--muted); font-size: 11px; white-space: nowrap; }
.file-status { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.file-status.done  { background: var(--green); }
.file-status.error { background: var(--red); }

/* ── Params ── */
.param-section { margin-bottom: 16px; }
.param-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing:.05em; margin-bottom: 6px; display: block; }
.param-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.param-chip { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 12px; cursor: pointer; transition: all .2s; user-select: none; }
.param-chip:hover { background: var(--glass); border-color: var(--accent); color: var(--accent); }
.param-chip.selected { background: linear-gradient(135deg, var(--accent), #2563eb); color: #fff; border-color: transparent; font-weight: 600; box-shadow: 0 2px 8px rgba(96,165,250,.2); }
.param-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text); font-size: 13px; }
.param-input:focus { outline: none; border-color: var(--accent); }
select.param-input { cursor: pointer; }

/* ── Pipeline stages ── */
.stage-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--card); border-radius: 8px; margin-bottom: 6px; }
.stage-toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--border); cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; }
.stage-toggle.on { background: var(--accent); }
.stage-toggle::after { content:''; position:absolute; top:3px; right:3px; width:14px; height:14px; border-radius:50%; background:#fff; transition: transform .2s; }
.stage-toggle.on::after { transform: translateX(-16px); }
.stage-name { flex:1; font-size:13px; }
.stage-status { font-size: 11px; color: var(--muted); }
.stage-status.ok   { color: var(--green); }
.stage-status.err  { color: var(--red); }
.stage-status.skip { color: var(--muted); }

/* ── Run button ── */
#run-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--green), #10b981); color: #052e16; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 14px; transition: all .2s; box-shadow: 0 4px 20px rgba(52,211,153,.2); letter-spacing: .02em; }
#run-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(52,211,153,.35); }
#run-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; box-shadow: none; transform: none; }
#cancel-btn { width: 100%; padding: 10px; background: linear-gradient(135deg, var(--red), #e11d48); color: #fff; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 6px; display: none; box-shadow: 0 4px 16px rgba(251,113,133,.2); }
#cancel-btn.visible { display: block; }
.dry-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.dry-row label { font-size: 13px; color: var(--muted); cursor: pointer; }

/* ── Folder info pills ── */
#folder-info { padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.info-pill { background: var(--card); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--muted); }
.info-pill strong { color: var(--text); }
.warn-pill { background: #422006; color: var(--yellow); border: 1px solid #92400e; border-radius: 20px; padding: 3px 10px; font-size: 11px; }

/* ── Progress bar ── */
#progress-bar { height: 6px; background: var(--border); flex-shrink: 0; border-radius: 3px; position: relative; }
#progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width .3s; border-radius: 3px; }
#progress-fill.indeterminate { animation: slide 1.5s infinite; width: 30%; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
@keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }

/* ── Live status banner ── */
#live-status { display: none; background: linear-gradient(135deg, #1e293b 0%, #1a2744 100%); border-bottom: 2px solid var(--accent); padding: 12px 16px; flex-shrink: 0; }
#live-status.active { display: block; animation: fadeIn .3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
#live-stage { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
#live-file { font-size: 13px; color: var(--text); margin-bottom: 8px; direction: ltr; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 6px 10px; background: var(--card); border-radius: 6px; border-right: 3px solid var(--accent); }
#live-bar-wrap { height: 14px; background: var(--card); border-radius: 7px; overflow: hidden; position: relative; }
#live-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .3s; border-radius: 7px; }
#live-bar-wrap.indeterminate #live-bar-fill { animation: slide 1.5s infinite; width: 30%; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
#live-pct { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); font-size: 10px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.5); }
#live-counter { font-size: 12px; color: var(--muted); margin-top: 6px; display: flex; justify-content: space-between; }

/* ── Install banner ── */
#install-banner { display: none; background: linear-gradient(135deg, #1e1b4b, #312e81); border-bottom: 2px solid var(--accent2); padding: 10px 16px; align-items: center; gap: 10px; flex-shrink: 0; }
#install-banner.show { display: flex; animation: fadeIn .3s; }
#install-banner span { color: var(--text); font-size: 13px; flex: 1; }
#install-btn { background: linear-gradient(135deg, var(--accent2), #6366f1); color: #fff; border: none; border-radius: 8px; padding: 6px 16px; font-size: 12px; font-weight: 700; cursor: pointer; }
#install-dismiss { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; }

/* ── Log toggle ── */
.log-toggle { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; padding: 2px 6px; transition: transform .2s; }
#log-panel.collapsed .log-toggle { transform: rotate(180deg); }

/* ── Section tabs (Audio / Video) ── */
#section-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sec-tab { flex: 1; padding: 8px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 600; border-bottom: 2px solid transparent; transition: all .2s; font-family: var(--font); }
.sec-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.sec-tab:hover:not(.active) { color: var(--text); background: var(--glass); }

/* ── Video sidebar divider ── */
.op-section-label { padding: 8px 14px 2px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; border-top: 1px solid var(--border); margin-top: 4px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── Toast ── */
#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; }
#toast.show { opacity: 1; }

/* ── Resume banner ── */
#resume-banner { display: none; background: linear-gradient(90deg,#1c1917,#292524); border-bottom: 2px solid var(--yellow); padding: 8px 14px; align-items: center; gap: 10px; flex-shrink: 0; font-size: 13px; }
#resume-banner.show { display: flex; }
#resume-banner .rb-op  { color: var(--yellow); font-weight: 700; }
#resume-banner .rb-fld { color: var(--muted); font-size: 11px; direction: ltr; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
#resume-btn { background: var(--yellow); color: #1c1917; border: none; border-radius: 6px; padding: 4px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
#resume-dismiss { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }

/* ── Browse modal ── */
#browse-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 300; align-items: center; justify-content: center; }
#browse-overlay.open { display: flex; }
#browse-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: min(520px, 96vw); max-height: 82vh; display: flex; flex-direction: column; box-shadow: 0 24px 60px rgba(0,0,0,.5); }
#browse-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
#browse-header strong { font-size: 14px; }
#browse-crumb { flex: 1; font-size: 11px; color: var(--muted); direction: ltr; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#browse-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }
#browse-list { overflow-y: auto; flex: 1; padding: 6px 8px; }
.browse-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: background .1s; direction: ltr; }
.browse-item:hover { background: var(--card); }
.browse-item .bi-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
.browse-item .bi-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.browse-item.bi-parent { color: var(--muted); }
.browse-item.bi-select { background: rgba(56,189,248,.12); border: 1px solid var(--accent); color: var(--accent); font-weight: 600; margin-bottom: 4px; }
.browse-item.bi-select:hover { background: rgba(56,189,248,.2); }
#browse-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
#browse-select-btn { background: var(--green); color: #052e16; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer; }
#browse-cancel-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">

<!-- Install banner -->
<div id="install-banner">
  <span>📲 ثبّت التطبيق على جهازك للوصول السريع</span>
  <button id="install-btn" onclick="installPWA()">تثبيت</button>
  <button id="install-dismiss" onclick="dismissInstall()">✕</button>
</div>

<!-- Header -->
<header>
  <div class="status-dot" id="status-dot"></div>
  <h1>🎵 MP3 Manager <span id="running-label"></span></h1>
  <div style="margin-right:auto"></div>
  <span style="font-size:11px;color:var(--muted)" id="server-url"></span>
</header>

<!-- Resume banner -->
<div id="resume-banner">
  <span>↩</span>
  <span class="rb-op" id="rb-op"></span>
  <span class="rb-fld" id="rb-fld"></span>
  <button id="resume-btn" onclick="resumeLastOp()">استئناف</button>
  <button id="resume-dismiss" onclick="dismissResume()" title="إخفاء">✕</button>
</div>

<!-- Folder bar -->
<div id="folder-bar">
  <input type="text" id="folder-input" list="folder-history"
         placeholder="/storage/self/primary/Music" value=""
         onkeydown="if(event.key==='Enter') loadFolder()" />
  <datalist id="folder-history"></datalist>
  <button onclick="openBrowse()" style="background:var(--card);color:var(--text);border:1px solid var(--border)">🗂 Browse</button>
  <button onclick="loadFolder()">📂 فتح</button>
</div>

<!-- Section tabs -->
<div id="section-tabs">
  <button class="sec-tab active" id="tab-audio" onclick="switchSection('audio')">🎵 Audio</button>
  <button class="sec-tab" id="tab-video" onclick="switchSection('video')">📹 Video</button>
</div>

<!-- Folder info -->
<div id="folder-info">
  <span class="info-pill">انتظار...</span>
</div>

<!-- Copy notice -->
<div id="copy-notice" style="display:none;background:linear-gradient(90deg,#052e16,#0d2d1a);border-bottom:2px solid var(--green);padding:7px 14px;font-size:12px;display:none;align-items:center;gap:8px;flex-shrink:0">
  <span style="color:var(--green);font-weight:700">🛡 النسخة:</span>
  <span id="copy-path" style="color:var(--text);direction:ltr;font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
  <button onclick="navigateToCopy()" style="background:var(--green);color:#052e16;border:none;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer">فتح</button>
</div>

<!-- Progress -->
<div id="progress-bar"><div id="progress-fill"></div></div>

<!-- Live status banner -->
<div id="live-status">
  <div id="live-stage"></div>
  <div id="live-file"></div>
  <div id="live-bar-wrap">
    <div id="live-bar-fill"></div>
    <span id="live-pct"></span>
  </div>
  <div id="live-counter">
    <span id="live-counter-text"></span>
    <span id="live-elapsed"></span>
  </div>
</div>

<!-- Main -->
<div id="main">

  <!-- Content -->
  <div id="content">
    <div id="panels">
      <!-- Params -->
      <div id="params-panel">
        <div id="params-content">
          <!-- Filled by JS -->
        </div>
        <button id="run-btn" onclick="runOperation()">▶ تشغيل</button>
        <button id="cancel-btn" onclick="cancelRun()">■ إيقاف</button>
        <div class="dry-row">
          <input type="checkbox" id="make-copy" />
          <label for="make-copy">إنشاء نسخة أولاً (موصى به)</label>
        </div>
        <div class="dry-row">
          <input type="checkbox" id="recursive" checked />
          <label for="recursive">تضمين المجلدات الفرعية (Recursive)</label>
        </div>
        <div class="dry-row">
          <input type="checkbox" id="dry-run" />
          <label for="dry-run">Dry Run (معاينة بدون تغيير)</label>
        </div>
      </div>

      <!-- Log -->
      <div id="log-panel">
        <div id="log-header" style="cursor:pointer" onclick="toggleLog()">
          <div style="display:flex;align-items:center;gap:8px">
            <button class="log-toggle" title="طي/بسط السجل">▼</button>
            <strong style="font-size:13px">📋 السجل</strong>
          </div>
          <div style="display:flex;gap:8px;align-items:center" onclick="event.stopPropagation()">
            <span id="log-count" style="font-size:11px;color:var(--muted)">0 سطر</span>
            <button onclick="downloadLog()" title="تحميل السجل" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px">⬇</button>
            <button onclick="clearLog()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px">مسح</button>
          </div>
        </div>
        <div id="log-output"></div>
        <div id="file-list"></div>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="op-pipeline">
      <button class="op-btn" data-op="pipeline" onclick="selectOp('pipeline')">
        <span class="op-icon">⚡</span>
        <span class="op-label">Pipeline</span>
      </button>
    </div>
    <button class="op-btn" data-op="rename" onclick="selectOp('rename')">
      <span class="op-icon">✏️</span><span class="op-label">Rename & Arrange</span>
    </button>
    <button class="op-btn" data-op="compress" onclick="selectOp('compress')">
      <span class="op-icon">📦</span><span class="op-label">Compress</span>
    </button>
    <button class="op-btn" data-op="speed" onclick="selectOp('speed')">
      <span class="op-icon">⏩</span><span class="op-label">Speed</span>
    </button>
    <button class="op-btn" data-op="split" onclick="selectOp('split')">
      <span class="op-icon">✂️</span><span class="op-label">Split</span>
    </button>
    <button class="op-btn" data-op="silence" onclick="selectOp('silence')">
      <span class="op-icon">🔇</span><span class="op-label">Remove Silence</span>
    </button>
    <button class="op-btn" data-op="convert" onclick="selectOp('convert')">
      <span class="op-icon">🔄</span><span class="op-label">Convert → MP3</span>
    </button>
    <button class="op-btn" data-op="merge" onclick="selectOp('merge')">
      <span class="op-icon">🔗</span><span class="op-label">Merge</span>
    </button>
    <button class="op-btn" data-op="csv" onclick="selectOp('csv')">
      <span class="op-icon">📊</span><span class="op-label">Export CSV</span>
    </button>
    <button class="op-btn" data-op="series" onclick="selectOp('series')">
      <span class="op-icon">📚</span><span class="op-label">Series Detection</span>
    </button>
    <button class="op-btn" data-op="normalize" onclick="selectOp('normalize')">
      <span class="op-icon">🔊</span><span class="op-label">Normalize Volume</span>
    </button>
    <button class="op-btn" data-op="batch_folders" onclick="selectOp('batch_folders')">
      <span class="op-icon">📂⚡</span><span class="op-label">Batch by Name</span>

    <!-- Video operations (hidden by default) -->
    <div id="video-ops" style="display:none">
      <div class="op-section-label">📹 فيديو</div>
      <button class="op-btn" data-op="video_rename" onclick="selectOp('video_rename')">
        <span class="op-icon">✏️</span><span class="op-label">Rename & Arrange</span>
      </button>
      <button class="op-btn" data-op="video_compress" onclick="selectOp('video_compress')">
        <span class="op-icon">📦</span><span class="op-label">Compress</span>
      </button>
      <button class="op-btn" data-op="video_speed" onclick="selectOp('video_speed')">
        <span class="op-icon">⏩</span><span class="op-label">Speed</span>
      </button>
      <button class="op-btn" data-op="video_trim" onclick="selectOp('video_trim')">
        <span class="op-icon">✂️</span><span class="op-label">Trim / Cut</span>
      </button>
      <button class="op-btn" data-op="video_convert" onclick="selectOp('video_convert')">
        <span class="op-icon">🔄</span><span class="op-label">Convert Format</span>
      </button>
      <button class="op-btn" data-op="video_merge" onclick="selectOp('video_merge')">
        <span class="op-icon">🔗</span><span class="op-label">Merge</span>
      </button>
      <button class="op-btn" data-op="video_extract" onclick="selectOp('video_extract')">
        <span class="op-icon">🎵</span><span class="op-label">Extract Audio</span>
      </button>
      <button class="op-btn" data-op="video_csv" onclick="selectOp('video_csv')">
        <span class="op-icon">📊</span><span class="op-label">Export CSV</span>
      </button>
    </div>
  </div>
</div>

</div><!-- #app -->

<!-- Browse Modal -->
<div id="browse-overlay" onclick="if(event.target===this) closeBrowse()">
  <div id="browse-box">
    <div id="browse-header">
      <strong>🗂 اختر مجلداً</strong>
      <span id="browse-crumb"></span>
      <button id="browse-close" onclick="closeBrowse()">✕</button>
    </div>
    <div id="browse-list"></div>
    <div id="browse-footer">
      <button id="browse-cancel-btn" onclick="closeBrowse()">إلغاء</button>
      <button id="browse-select-btn" onclick="selectBrowseFolder()">✓ اختر هذا المجلد</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API = window.location.origin;
let currentOp = 'compress';
let currentSection = 'audio';
let currentFolder = localStorage.getItem('mp3_folder') || '';
let isRunning = false;
let eventSource = null;
let logLines = 0;
let prefs = {};
let _presets = {};
let _aiPattern = null;
let _logBuffer = [];
let _resumeClicked = false;
let _startTime = 0;
let _elapsedTimer = null;

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('server-url').textContent = API;
  document.getElementById('folder-input').value = currentFolder;

  // Load prefs
  try {
    const r = await fetch(`${API}/api/prefs`);
    prefs = await r.json();
    if (prefs.ai_pattern) _aiPattern = prefs.ai_pattern;
  } catch(e) { prefs = {}; }

  // Load presets
  try {
    const r = await fetch(`${API}/api/presets`);
    _presets = await r.json();
  } catch(e) { _presets = {}; }

  // Populate folder history datalist
  initHistory();

  document.getElementById('recursive').addEventListener('change', () => {
    if (currentFolder) loadFolder();
  });

  selectOp('compress');
  if (currentFolder) loadFolder();

  // Check for interrupted operation on first load
  try {
    const r = await fetch(`${API}/api/status`);
    const d = await r.json();
    if (d.running) { setRunning(true); startSSE(); }
    else checkResumeBanner(d.last_run);
  } catch(e) {}

  // Poll status every 3s
  setInterval(pollStatus, 3000);
});

// ── Folder ────────────────────────────────────────────────────────────────────
async function loadFolder() {
  const path = document.getElementById('folder-input').value.trim();
  if (!path) return;
  currentFolder = path;
  localStorage.setItem('mp3_folder', path);

  document.getElementById('folder-info').innerHTML = '<span class="info-pill">جاري التحميل...</span>';
  document.getElementById('copy-notice').style.display = 'none';

  try {
    const rec = document.getElementById('recursive').checked;
    const r = await fetch(`${API}/api/folder/info?path=${encodeURIComponent(path)}&recursive=${rec}`);
    const d = await r.json();

    if (d.error) {
      document.getElementById('folder-info').innerHTML =
        `<span class="warn-pill">⚠ ${d.error}</span>`;
      return;
    }

    const pills = [
      `<span class="info-pill"><strong>${d.mp3_count}</strong> MP3</span>`,
      d.video_count > 0 ? `<span class="info-pill" style="color:var(--accent2)"><strong>${d.video_count}</strong> 📹 فيديو</span>` : '',
      `<span class="info-pill"><strong>${d.other_media_count}</strong> ملفات أخرى</span>`,
      `<span class="info-pill"><strong>${d.subfolder_count}</strong> مجلد</span>`,
    ].filter(Boolean);
    if (!d.ffmpeg_ok)
      pills.push('<span class="warn-pill">⚠ ffmpeg غير موجود</span>');
    if (d.mp3_count === 0 && d.video_count === 0 && d.other_media_count === 0)
      pills.push(`<span class="warn-pill">⚠ لا توجد ملفات — ${d.summary}</span>`);

    document.getElementById('folder-info').innerHTML = pills.join('');

    // Save to history
    addToHistory(path);

    // File list
    renderFileList(d.mp3_files, d.video_files || [], d.other_files, d.subfolders);
  } catch(e) {
    document.getElementById('folder-info').innerHTML =
      `<span class="warn-pill">⚠ لا يمكن الاتصال بالسيرفر: ${e.message}</span>`;
  }
}

// ── Folder Browser ───────────────────────────────────────────────────────────
let _browseCurrent = '/';

async function openBrowse() {
  const start = document.getElementById('folder-input').value.trim();
  _browseCurrent = start || '/';
  document.getElementById('browse-overlay').classList.add('open');
  await loadBrowseDir(_browseCurrent);
}

function closeBrowse() {
  document.getElementById('browse-overlay').classList.remove('open');
}

function selectBrowseFolder() {
  document.getElementById('folder-input').value = _browseCurrent;
  closeBrowse();
  loadFolder();
}

async function loadBrowseDir(path) {
  _browseCurrent = path;
  document.getElementById('browse-crumb').textContent = path;

  const listEl = document.getElementById('browse-list');
  listEl.innerHTML = '<div style="color:var(--muted);padding:16px;text-align:center">جاري التحميل...</div>';

  try {
    const r = await fetch(`${API}/api/folder/browse?path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if (d.error) {
      listEl.innerHTML = `<div style="color:var(--red);padding:16px">${d.error}</div>`;
      return;
    }

    let html = '';

    // "Select this folder" shortcut at top
    html += `<div class="browse-item bi-select" onclick="selectBrowseFolder()">
      <span class="bi-icon">✓</span>
      <span class="bi-name">${d.current === '/' ? '/ (root)' : d.current.split('/').pop() || d.current}</span>
      <span style="font-size:11px;color:inherit;opacity:.7">اختر هذا</span>
    </div>`;

    // Parent
    if (d.parent !== d.current) {
      html += `<div class="browse-item bi-parent" onclick="loadBrowseDir('${esc(d.parent)}')">
        <span class="bi-icon">⬆</span>
        <span class="bi-name">.. (رجوع)</span>
      </div>`;
    }

    // Subdirectories
    if (d.dirs.length === 0) {
      html += '<div style="color:var(--muted);padding:12px 10px;font-size:12px">لا توجد مجلدات فرعية</div>';
    } else {
      d.dirs.forEach(dir => {
        html += `<div class="browse-item" onclick="loadBrowseDir('${esc(dir.path)}')">
          <span class="bi-icon">📁</span>
          <span class="bi-name">${dir.name}</span>
          <span style="font-size:11px;color:var(--muted)">›</span>
        </div>`;
      });
    }

    listEl.innerHTML = html;
    document.getElementById('browse-crumb').textContent = d.current;
  } catch(e) {
    listEl.innerHTML = `<div style="color:var(--red);padding:16px">خطأ: ${e.message}</div>`;
  }
}

function navigateToCopy() {
  const path = document.getElementById('copy-path').textContent;
  if (path) {
    document.getElementById('folder-input').value = path;
    loadFolder();
  }
}

function esc(path) {
  // Escape single quotes for inline onclick attributes
  return path.replace(/'/g, "\\'");
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── History ───────────────────────────────────────────────────────────────────
function initHistory() {
  const hist = JSON.parse(localStorage.getItem('mp3_history') || '[]');
  const dl = document.getElementById('folder-history');
  dl.innerHTML = hist.map(p => `<option value="${p}">`).join('');
}

function addToHistory(path) {
  let hist = JSON.parse(localStorage.getItem('mp3_history') || '[]');
  hist = hist.filter(p => p !== path);
  hist.unshift(path);
  hist = hist.slice(0, 10);
  localStorage.setItem('mp3_history', JSON.stringify(hist));
  initHistory();
}

// ── Presets ───────────────────────────────────────────────────────────────────
async function savePresetUI() {
  const name = document.getElementById('save-preset-name')?.value?.trim();
  if (!name) { toast('أدخل اسماً للإعداد'); return; }
  const params = getParams();
  try {
    await fetch(`${API}/api/presets/${encodeURIComponent(name)}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(params),
    });
    _presets[name] = params;
    toast(`✓ تم حفظ الإعداد: ${name}`);
    if (currentOp === 'pipeline') selectOp('pipeline'); // re-render
  } catch(e) { toast('خطأ في حفظ الإعداد'); }
}

function loadPresetUI() {
  const name = document.getElementById('preset-select')?.value;
  if (!name || !_presets[name]) { toast('اختر إعداداً أولاً'); return; }
  const p = _presets[name];
  // Apply stages
  ['convert','compress','speed','silence','rename'].forEach(k => {
    const el = document.getElementById(`stage_${k}`);
    if (!el) return;
    const should = p.stages?.[k] ?? false;
    if (should) el.classList.add('on'); else el.classList.remove('on');
  });
  // Apply numeric values
  if (p.bitrate)       { document.getElementById('bitrate').value = p.bitrate; }
  if (p.speed)         { document.getElementById('speed').value = p.speed; }
  if (p.silence_sec)   { document.getElementById('silence_sec').value = p.silence_sec; }
  if (p.number_action) { document.getElementById('number_action_pl').value = p.number_action; }
  toast(`✓ تم تحميل: ${name}`);
}

async function deletePresetUI() {
  const name = document.getElementById('preset-select')?.value;
  if (!name) { toast('اختر إعداداً للحذف'); return; }
  try {
    await fetch(`${API}/api/presets/${encodeURIComponent(name)}`, { method: 'DELETE' });
    delete _presets[name];
    toast(`تم حذف: ${name}`);
    if (currentOp === 'pipeline') selectOp('pipeline');
  } catch(e) { toast('خطأ في الحذف'); }
}

// ── Log download ──────────────────────────────────────────────────────────────
function downloadLog() {
  if (_logBuffer.length === 0) { toast('لا يوجد سجل للتحميل'); return; }
  const text = _logBuffer.join('\n');
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mp3manager_log_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function safeId(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return 'fs_' + Math.abs(h).toString(36);
}

function renderFileList(mp3s, videos, others, dirs) {
  const el = document.getElementById('file-list');
  let html = '';

  if (dirs && dirs.length) {
    html += '<h3>📁 مجلدات فرعية</h3>';
    dirs.forEach(d => {
      html += `<div class="file-item">
        <span class="file-name" style="cursor:pointer;color:var(--accent)"
          onclick="navigateTo('${esc(d.path || d.name)}')">${escHtml(d.name)}/</span>
        <span class="file-meta">${escHtml(d.mtime||'')}</span></div>`;
    });
  }

  if (mp3s && mp3s.length) {
    html += '<h3>🎵 ملفات MP3</h3>';
    mp3s.forEach(f => {
      html += `<div class="file-item">
        <div class="file-status" id="${safeId(f.name)}"></div>
        <span class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
        <span class="file-meta">${escHtml(f.duration||'')} ${escHtml(f.size_human)}</span></div>`;
    });
  }

  if (videos && videos.length) {
    html += '<h3>📹 ملفات فيديو</h3>';
    videos.forEach(f => {
      const res = f.resolution ? `<span style="color:var(--accent2)">${escHtml(f.resolution)}</span> · ` : '';
      const fps = f.fps ? `${f.fps}fps · ` : '';
      html += `<div class="file-item">
        <div class="file-status" id="${safeId(f.name)}"></div>
        <span class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
        <span class="file-meta">${res}${fps}${escHtml(f.duration||'')} ${escHtml(f.size_human)}</span></div>`;
    });
  }

  if (others && others.length) {
    html += '<h3>🎬 ملفات أخرى</h3>';
    others.forEach(f => {
      html += `<div class="file-item">
        <span class="file-name">${escHtml(f.name)}</span>
        <span class="file-meta">${escHtml(f.ext)}</span></div>`;
    });
  }

  el.innerHTML = html;
}

function navigateTo(name) {
  const current = document.getElementById('folder-input').value.trim();
  const newPath = current.endsWith('/') ? current + name : current + '/' + name;
  document.getElementById('folder-input').value = newPath;
  loadFolder();
}

// ── AI Pattern (external AI workflow) ─────────────────────────────────────────
async function copyAiPrompt() {
  const folder = document.getElementById('folder-input')?.value.trim();
  if (!folder) { toast('حمّل مجلداً أولاً'); return; }
  try {
    const res = await fetch(`/api/ai-prompt?folder=${encodeURIComponent(folder)}`);
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'تعذر تحميل الملفات'); return; }
    showPromptModal(data.prompt, data.count);
  } catch {
    toast('خطأ في الاتصال بالخادم');
  }
}

function showPromptModal(text, count) {
  document.getElementById('ai-prompt-modal')?.remove();
  const modal = document.createElement('div');
  modal.id = 'ai-prompt-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML = `
    <div style="background:var(--card);border-radius:12px;padding:16px;width:100%;max-width:580px;max-height:85vh;display:flex;flex-direction:column;gap:10px;box-shadow:0 8px 32px #0008">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:bold;color:var(--text);font-size:14px">الـ Prompt (${count} ملف) — الصقه في أي ذكاء اصطناعي</span>
        <button onclick="document.getElementById('ai-prompt-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1">×</button>
      </div>
      <textarea id="ai-prompt-text" readonly style="flex:1;min-height:320px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:11px;font-family:monospace;resize:none;direction:ltr;line-height:1.6">${escHtml(text)}</textarea>
      <button class="btn-run" onclick="copyPromptFromModal()" style="width:100%">📋 نسخ الـ Prompt</button>
      <div id="ai-copy-hint" style="font-size:11px;color:var(--muted);text-align:center;display:none">تعذر النسخ التلقائي — حدد النص يدوياً (Ctrl+A) ثم انسخه</div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

function copyPromptFromModal() {
  const ta = document.getElementById('ai-prompt-text');
  if (!ta) return;
  navigator.clipboard.writeText(ta.value)
    .then(() => toast('✓ تم النسخ — الصقه في أي ذكاء اصطناعي'))
    .catch(() => {
      ta.select();
      try { document.execCommand('copy'); toast('✓ تم النسخ'); }
      catch { document.getElementById('ai-copy-hint').style.display = 'block'; }
    });
}

function applyAiPattern() {
  const raw = document.getElementById('ai-pattern-input')?.value.trim();
  if (!raw) { toast('الصق JSON أولاً'); return; }
  let data;
  try {
    const match = raw.match(/\{[\s\S]*\}/);
    data = JSON.parse(match ? match[0] : raw);
  } catch {
    toast('✗ JSON غير صالح — تحقق من الصياغة');
    return;
  }
  if (!data.pattern) { toast('لم يُعثر على نمط متسق في JSON'); return; }
  try { new RegExp(data.pattern); } catch { toast('✗ التعبير النمطي (regex) غير صالح'); return; }
  _aiPattern = data;
  prefs.ai_pattern = data;
  fetch(`${API}/api/prefs`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ai_pattern: data})});
  const preview = document.getElementById('ai-pattern-preview');
  document.getElementById('ai-pattern-preview-desc').textContent =
    `✓ ${data.description || data.pattern}`;
  document.getElementById('ai-pattern-preview-samples').innerHTML =
    (data.examples || []).map(e =>
      `<span style="color:var(--accent)">${escHtml(String(e.filename))}</span> ← رقم ${e.number}`
    ).join('<br>');
  if (preview) preview.style.display = 'block';
  toast('✓ تم تطبيق النمط المخصص وحفظه');
}

function clearAiPattern() {
  _aiPattern = null;
  delete prefs.ai_pattern;
  fetch(`${API}/api/prefs`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ai_pattern: null})});
  const preview = document.getElementById('ai-pattern-preview');
  const input = document.getElementById('ai-pattern-input');
  if (preview) preview.style.display = 'none';
  if (input) input.value = '';
  toast('تم إلغاء النمط المخصص وحذفه');
}

// ── Section switcher (Audio / Video) ─────────────────────────────────────────
function switchSection(section) {
  currentSection = section;
  const audioOps = document.querySelectorAll('#sidebar > .op-btn, #sidebar > .op-pipeline');
  const videoDiv  = document.getElementById('video-ops');
  if (section === 'audio') {
    audioOps.forEach(el => el.style.display = '');
    videoDiv.style.display = 'none';
    document.getElementById('tab-audio').classList.add('active');
    document.getElementById('tab-video').classList.remove('active');
    selectOp('compress');
  } else {
    audioOps.forEach(el => el.style.display = 'none');
    videoDiv.style.display = '';
    document.getElementById('tab-video').classList.add('active');
    document.getElementById('tab-audio').classList.remove('active');
    selectOp('video_compress');
  }
}

// ── Operation selector ────────────────────────────────────────────────────────
function selectOp(op) {
  currentOp = op;
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-op="${op}"]`);
  if (btn) btn.classList.add('active');
  renderParams(op);
  if (op === 'rename') _restoreAiPatternPreview();
}

function _restoreAiPatternPreview() {
  if (!_aiPattern) return;
  const preview = document.getElementById('ai-pattern-preview');
  const desc    = document.getElementById('ai-pattern-preview-desc');
  const samples = document.getElementById('ai-pattern-preview-samples');
  if (!preview) return;
  desc.textContent = `✓ ${_aiPattern.description || _aiPattern.pattern}`;
  samples.innerHTML = (_aiPattern.examples || []).map(e =>
    `<span style="color:var(--accent)">${escHtml(String(e.filename))}</span> ← رقم ${e.number}`
  ).join('<br>');
  preview.style.display = 'block';
}

// ── Params renderer ───────────────────────────────────────────────────────────
const BITRATES = [32, 48, 64, 96, 128, 192, 320];
const SPEEDS   = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
const DURATIONS = ['5m','10m','15m','20m','30m','45m','1h'];

function chips(id, values, defaultVal, fmt=v=>v) {
  const val = prefs[id] || defaultVal;
  return `<div class="param-row">${values.map(v =>
    `<div class="param-chip ${String(v)===String(val)?'selected':''}"
      onclick="selectChip(this,'${id}','${v}')">${fmt(v)}</div>`
  ).join('')}</div>
  <input class="param-input" id="${id}" value="${val}" placeholder="أو اكتب قيمة..."
    style="margin-top:4px" oninput="unselectChips('${id}')">`;
}

function selectChip(el, id, val) {
  el.closest('.param-section').querySelectorAll('.param-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById(id).value = val;
}
function unselectChips(id) {
  document.querySelectorAll(`[onclick*="'${id}'"]`).forEach(c=>c.classList.remove('selected'));
}

function toggle(id) {
  const el = document.getElementById(id);
  el.classList.toggle('on');
}
function isOn(id) { return document.getElementById(id)?.classList.contains('on'); }

function toggleSilenceParams() {
  const on = isOn('do_silence_toggle');
  const el = document.getElementById('silence-params');
  if (el) el.style.display = on ? 'block' : 'none';
}

// ── Build params from UI ──────────────────────────────────────────────────────
function getParams() {
  const g = id => document.getElementById(id)?.value;
  const gn = id => parseFloat(g(id)) || 0;

  if (currentOp === 'pipeline') {
    return {
      stages: {
        convert:  isOn('stage_convert'),
        compress: isOn('stage_compress'),
        speed:    isOn('stage_speed'),
        silence:  isOn('stage_silence'),
        rename:   isOn('stage_rename'),
      },
      bitrate:       gn('bitrate') || prefs.default_bitrate || 64,
      convert_bitrate: gn('bitrate') || prefs.default_bitrate || 128,
      speed:         gn('speed')   || prefs.default_speed   || 1.25,
      silence_sec:   gn('silence_sec') || prefs.silence_threshold_sec || 0.5,
      silence_db:    gn('silence_db')  || prefs.silence_db  || -40,
      number_action: g('number_action_pl') || prefs.number_action || '3',
    };
  }

  const map = {
    rename:    { number_action: g('number_action'), ...(_aiPattern ? { ai_pattern: _aiPattern } : {}) },
    compress:  { bitrate: gn('bitrate') },
    speed:     { speed:   gn('speed')   },
    split:     { split_dur: g('split_dur'), after_split: g('after_split') },
    silence:   { silence_sec: gn('silence_sec'), silence_db: gn('silence_db') },
    convert:   { bitrate: gn('bitrate') },
    merge:     { merge_gap: gn('merge_gap') },
    normalize:     { preset: g('normalize_preset') || '1' },
    batch_folders: {
      do_silence:  isOn('do_silence_toggle'),
      silence_sec: gn('silence_sec') || prefs.silence_threshold_sec || 0.5,
      silence_db:  gn('silence_db')  || prefs.silence_db || -40,
    },
    csv:    {},
    series: {},
    // Video operations
    video_rename:   { number_action: g('number_action') || prefs.number_action || '3' },
    video_compress: { video_crf: gn('video_crf') || prefs.video_crf || 23, video_res: g('video_res') || '' },
    video_speed:    { video_speed: gn('video_speed') || prefs.video_default_speed || 1.0 },
    video_trim:     { trim_start: g('trim_start') || '0', trim_end: g('trim_end') || '' },
    video_convert:  { video_format: g('video_format') || prefs.video_output_format || 'mp4', copy_streams: g('copy_streams') !== '0' },
    video_merge:    {},
    video_extract:  { audio_format: g('audio_format') || prefs.video_audio_format || 'mp3', bitrate: gn('bitrate') || prefs.default_bitrate || 128 },
    video_csv:      {},
  };
  return map[currentOp] || {};
}

// ── Run ───────────────────────────────────────────────────────────────────────
async function runOperation(skipAnalyze) {
  if (isRunning) return;
  const folder = document.getElementById('folder-input').value.trim();
  if (!folder) { toast('حدد مجلد أولاً'); return; }

  const params = getParams();
  params.recursive  = document.getElementById('recursive').checked;
  params.make_copy  = document.getElementById('make-copy').checked;

  // For rename: analyze first and show correction modal if problems found
  if (currentOp === 'rename' && !skipAnalyze) {
    try {
      const ar = await fetch(`${API}/api/rename/analyze`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ folder, params, recursive: params.recursive }),
      });
      const ad = await ar.json();
      if (ad.error) { toast(ad.error); return; }
      if (ad.has_problems) {
        showRenameAnalyzeModal(ad);
        return;
      }
    } catch(e) {
      // Network error during analyze — proceed anyway
    }
  }

  clearLog();
  setRunning(true);

  const payload = {
    operation: currentOp,
    folder:    folder,
    params:    params,
    dry_run:   document.getElementById('dry-run').checked,
  };

  try {
    const r = await fetch(`${API}/api/run`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (d.error) { appendLog(`✗ ${d.error}`, 'err'); setRunning(false); return; }
    appendLog(`▶ بدء: ${currentOp}`, 'head');
    startSSE();
  } catch(e) {
    appendLog(`✗ تعذر الاتصال: ${e.message}`, 'err');
    setRunning(false);
  }
}

function showRenameAnalyzeModal(ad) {
  document.getElementById('rename-analyze-modal')?.remove();

  const noSeqCount = ad.no_seq_count || 0;
  const dupSeqCount = ad.dup_seq_count || 0;
  const problemStems = ad.problem_stems || [];

  let problemHtml = '';
  if (problemStems.length) {
    problemHtml = problemStems.map(s => `<div style="font-size:11px;color:var(--muted);padding:2px 0;word-break:break-all">${escHtml(s)}</div>`).join('');
  }

  let warningLines = [];
  if (noSeqCount > 0) warningLines.push(`${noSeqCount} ملف لم يُعثر على رقم تسلسل فيه`);
  if (dupSeqCount > 0) warningLines.push(`${dupSeqCount} ملف بأرقام تسلسل متكررة`);

  const modal = document.createElement('div');
  modal.id = 'rename-analyze-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML = `
    <div style="background:var(--card);border-radius:12px;padding:20px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;direction:rtl">
      <div style="font-size:16px;font-weight:bold;margin-bottom:8px;color:var(--yellow)">⚠ مشاكل في أسماء الملفات</div>
      <div style="font-size:13px;color:var(--text);margin-bottom:12px">${warningLines.map(l=>`<div>• ${l}</div>`).join('')}</div>

      <div style="max-height:160px;overflow-y:auto;background:var(--surface);border-radius:8px;padding:8px;margin-bottom:12px">
        ${problemHtml || '<div style="font-size:11px;color:var(--muted)">لا توجد ملفات مشكلة</div>'}
      </div>

      <div style="font-size:13px;color:var(--text);margin-bottom:6px">
        الخطوة 1: انسخ الـ Prompt وأرسله لأي AI (ChatGPT، Claude.ai...)
      </div>
      <button onclick="copyRenameAnalysisPrompt()" style="width:100%;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;margin-bottom:12px;font-size:13px">
        📋 نسخ الـ Prompt للذكاء الاصطناعي
      </button>

      <div style="font-size:13px;color:var(--text);margin-bottom:6px">
        الخطوة 2: الصق JSON الناتج من الذكاء الاصطناعي هنا
      </div>
      <textarea id="rename-pattern-input"
        placeholder='{"pattern": "regex هنا", "description": "وصف", "examples": [...]}'
        style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-size:11px;font-family:monospace;resize:vertical;min-height:90px;direction:ltr;box-sizing:border-box"></textarea>

      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="applyAnalysisPattern()" style="flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;font-weight:bold">
          ✓ حفظ النمط وتشغيل
        </button>
        <button onclick="document.getElementById('rename-analyze-modal').remove(); runOperation(true)" style="flex:1;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:13px">
          تشغيل بدون نمط
        </button>
        <button onclick="document.getElementById('rename-analyze-modal').remove()" style="padding:10px 14px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:13px">
          إلغاء
        </button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  // Store the prompt for copy
  modal._prompt = ad.prompt;
}

function copyRenameAnalysisPrompt() {
  const modal = document.getElementById('rename-analyze-modal');
  const text = modal?._prompt || '';
  if (!text) { toast('لا يوجد prompt'); return; }
  navigator.clipboard.writeText(text).then(
    () => toast('✓ تم نسخ الـ Prompt'),
    () => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('✓ تم نسخ الـ Prompt');
    }
  );
}

async function applyAnalysisPattern() {
  const raw = document.getElementById('rename-pattern-input')?.value.trim();
  if (!raw) {
    document.getElementById('rename-analyze-modal')?.remove();
    runOperation(true);
    return;
  }

  let data;
  try {
    const match = raw.match(/\{[\s\S]*\}/);
    data = JSON.parse(match ? match[0] : raw);
  } catch(e) {
    toast('✗ JSON غير صالح — تحقق من الصياغة');
    return;
  }

  if (!data.pattern) { toast('لم يُعثر على pattern في JSON'); return; }

  try { new RegExp(data.pattern); } catch(e) { toast('✗ regex غير صالح'); return; }

  // Save pattern to global + prefs (fire-and-forget, don't block run)
  _aiPattern = data;
  fetch(`${API}/api/prefs`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ ai_pattern: data }),
  }).catch(() => {});

  // Update preview panel if visible (guarded)
  try { _restoreAiPatternPreview(); } catch(e) {}

  toast(`✓ تم حفظ النمط: ${data.description || data.pattern}`);
  document.getElementById('rename-analyze-modal')?.remove();
  runOperation(true);
}

async function cancelRun() {
  await fetch(`${API}/api/cancel`, {method:'POST'});
  appendLog('■ طلب إيقاف...', 'warn');
}

// ── SSE stream ────────────────────────────────────────────────────────────────
function startSSE() {
  if (eventSource) { eventSource.close(); }
  eventSource = new EventSource(`${API}/api/stream`);

  eventSource.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'ping') return;
    if (msg.type === 'log' ) { appendLog(msg.text); return; }
    if (msg.type === 'progress') {
      const pct = Math.round((msg.current / msg.total) * 100);
      // Top thin bar
      const fill = document.getElementById('progress-fill');
      fill.className = '';
      fill.style.width = pct + '%';
      // Live banner
      document.getElementById('live-file').textContent = msg.filename;
      document.getElementById('live-bar-fill').style.width = pct + '%';
      document.getElementById('live-bar-wrap').className = '';
      document.getElementById('live-pct').textContent = pct + '%';
      document.getElementById('live-counter-text').textContent =
        `${msg.current} / ${msg.total}`;
      // Header
      document.getElementById('running-label').textContent =
        `  ⏳ [${msg.current}/${msg.total}] ${msg.filename}`;
      return;
    }
    if (msg.type === 'stage') {
      appendLog(`\n━━ [${msg.current}/${msg.total}] ${msg.name} ━━`, 'head');
      // Live banner
      document.getElementById('live-stage').textContent =
        `${msg.name}  (${msg.current}/${msg.total})`;
      document.getElementById('live-file').textContent = 'جاري البدء...';
      document.getElementById('live-bar-fill').style.width = '0%';
      document.getElementById('live-bar-wrap').className = 'indeterminate';
      document.getElementById('live-pct').textContent = '';
      document.getElementById('live-counter-text').textContent = '';
      // Header + top bar
      const fill = document.getElementById('progress-fill');
      fill.className = 'indeterminate';
      fill.style.width = '';
      document.getElementById('running-label').textContent =
        `  ⏳ ${msg.name} (${msg.current}/${msg.total})`;
      return;
    }
    if (msg.type === 'copy') {
      const el = document.getElementById('copy-notice');
      document.getElementById('copy-path').textContent = msg.path;
      el.style.display = 'flex';
      appendLog(`🛡 النسخة: ${msg.path}`, 'ok');
      return;
    }
    if (msg.type === 'done') {
      // ── Savings report ──
      let report = `✓ اكتمل في ${msg.elapsed} ثانية`;
      if (msg.size_before && msg.size_after) {
        const saved = msg.size_before - msg.size_after;
        const beforeMB = (msg.size_before / 1048576).toFixed(1);
        const afterMB  = (msg.size_after  / 1048576).toFixed(1);
        if (saved > 0) {
          const pct = Math.round((saved / msg.size_before) * 100);
          const savedMB = (saved / 1048576).toFixed(1);
          report += `\n💾 الحجم: ${beforeMB} MB → ${afterMB} MB  (وفّرت ${pct}% — ${savedMB} MB)`;
        } else if (saved < 0) {
          report += `\n📦 الحجم: ${beforeMB} MB → ${afterMB} MB`;
        } else {
          report += `\n📦 الحجم: ${afterMB} MB (بدون تغيير)`;
        }
      }
      appendLog(report, 'ok');

      if (msg.copy_path) {
        const el = document.getElementById('copy-notice');
        document.getElementById('copy-path').textContent = msg.copy_path;
        el.style.display = 'flex';
      }
      _resumeClicked = false;
      setRunning(false);
      if (msg.copy_path) {
        document.getElementById('folder-input').value = msg.copy_path;
      }
      loadFolder();
      eventSource.close();
    }
  };
  eventSource.onerror = () => {
    eventSource.close();
    eventSource = null;
    if (!isRunning) return;
    appendLog('⚠ انقطع الاتصال — إعادة محاولة...', 'warn');
    // Retry after 3s — pollStatus will reconnect SSE if server is back
    setTimeout(async () => {
      try {
        const r = await fetch(`${API}/api/status`);
        const d = await r.json();
        if (d.running) {
          appendLog('↩ إعادة الاتصال...', 'warn');
          startSSE();
        } else {
          setRunning(false);
          appendLog('⚠ السيرفر أُعيد تشغيله — العملية انقطعت', 'warn');
          checkResumeBanner(d.last_run);
        }
      } catch(e) {
        setRunning(false);
        appendLog('⚠ السيرفر غير متاح', 'warn');
      }
    }, 3000);
  };
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function appendLog(text, cls='') {
  const el = document.getElementById('log-output');
  const line = document.createElement('div');
  line.className = 'log-line';

  // Detect style from rich markup or keywords
  const t = text.toLowerCase();
  if (!cls) {
    if (text.includes('[green]') || t.startsWith('✓') || t.includes('done') || t.includes('succeeded'))
      cls = 'ok';
    else if (text.includes('[red]') || t.startsWith('✗') || t.includes('error') || t.includes('fail'))
      cls = 'err';
    else if (text.includes('[yellow]') || t.startsWith('⚠') || t.includes('warn') || t.includes('skip'))
      cls = 'warn';
    else if (text.includes('[cyan]') || text.includes('──') || text.startsWith('▶'))
      cls = 'head';
    else if (text.startsWith('→') || text.includes('[dim]'))
      cls = 'info';
  }

  // Strip rich markup tags for display
  const clean = text.replace(/\[\/?\w+\]/g, '').replace(/\[\/?\w+ \w+=.*?\]/g, '');
  line.className = `log-line ${cls ? 'log-'+cls : ''}`;
  line.textContent = clean;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  logLines++;
  _logBuffer.push(clean);
  document.getElementById('log-count').textContent = logLines + ' سطر';
}

function clearLog() {
  document.getElementById('log-output').innerHTML = '';
  logLines = 0;
  _logBuffer = [];
  document.getElementById('log-count').textContent = '0 سطر';
}

function setRunning(running) {
  isRunning = running;
  document.getElementById('run-btn').disabled = running;
  document.getElementById('cancel-btn').classList.toggle('visible', running);
  document.getElementById('status-dot').className = 'status-dot' + (running ? ' running' : '');
  document.getElementById('running-label').textContent = running ? `  ⏳ ${currentOp}` : '';
  const fill = document.getElementById('progress-fill');
  fill.className = running ? 'indeterminate' : '';
  fill.style.width = running ? '' : '0%';

  // Live status banner
  const liveEl = document.getElementById('live-status');
  if (running) {
    liveEl.classList.add('active');
    document.getElementById('live-stage').textContent = currentOp;
    document.getElementById('live-file').textContent = 'جاري البدء...';
    document.getElementById('live-bar-fill').style.width = '0%';
    document.getElementById('live-pct').textContent = '';
    document.getElementById('live-counter-text').textContent = '';
    // Elapsed timer
    _startTime = Date.now();
    if (_elapsedTimer) clearInterval(_elapsedTimer);
    _elapsedTimer = setInterval(() => {
      const sec = Math.floor((Date.now() - _startTime) / 1000);
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      document.getElementById('live-elapsed').textContent =
        m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `${s}s`;
    }, 1000);
  } else {
    if (_elapsedTimer) { clearInterval(_elapsedTimer); _elapsedTimer = null; }
    // Show green completion banner briefly
    document.getElementById('live-stage').textContent = '✓ اكتملت العملية';
    document.getElementById('live-file').textContent = '';
    document.getElementById('live-bar-fill').style.width = '100%';
    document.getElementById('live-bar-fill').style.background = 'var(--green)';
    document.getElementById('live-pct').textContent = '100%';
    liveEl.style.borderBottomColor = 'var(--green)';
    setTimeout(() => {
      liveEl.classList.remove('active');
      liveEl.style.borderBottomColor = '';
      document.getElementById('live-bar-fill').style.background = '';
    }, 5000);
  }
}

let _serverWasOffline = false;

async function pollStatus() {
  try {
    const r = await fetch(`${API}/api/status`);
    const d = await r.json();

    // Server came back online after being down
    if (_serverWasOffline) {
      _serverWasOffline = false;
      appendLog('✓ السيرفر عاد للعمل', 'ok');
    }

    // Server is running but UI thinks it's not → reconnect SSE
    if (d.running && !isRunning) {
      setRunning(true);
      startSSE();
    }

    // UI thinks it's running but server says no → server restarted mid-op
    if (!d.running && isRunning) {
      setRunning(false);
      appendLog('⚠ السيرفر أُعيد تشغيله — العملية انقطعت', 'warn');
    }

    // Show resume banner if last operation was interrupted
    checkResumeBanner(d.last_run);

  } catch(e) {
    if (isRunning) {
      setRunning(false);
      appendLog('⚠ السيرفر غير متاح', 'warn');
    }
    _serverWasOffline = true;
  }
}

function checkResumeBanner(last) {
  // Don't show if user already clicked resume or if an operation is running
  if (_resumeClicked || isRunning) {
    document.getElementById('resume-banner').classList.remove('show');
    return;
  }
  if (!last || last.status !== 'running') {
    document.getElementById('resume-banner').classList.remove('show');
    return;
  }
  document.getElementById('rb-op').textContent = last.operation || '';
  document.getElementById('rb-fld').textContent = last.folder   || '';
  document.getElementById('resume-banner').classList.add('show');
}

async function resumeLastOp() {
  if (isRunning) { toast('العملية شغّالة بالفعل'); return; }
  _resumeClicked = true;
  document.getElementById('resume-banner').classList.remove('show');
  clearLog();
  setRunning(true);
  try {
    const r = await fetch(`${API}/api/resume`, { method: 'POST' });
    const d = await r.json();
    if (d.error) {
      appendLog(`✗ ${d.error}`, 'err');
      setRunning(false);
      return;
    }
    appendLog(`↩ استئناف: ${d.operation}`, 'head');
    // Update folder input to match
    if (d.folder) document.getElementById('folder-input').value = d.folder;
    startSSE();
  } catch(e) {
    appendLog(`✗ لا يمكن الاتصال: ${e.message}`, 'err');
    setRunning(false);
  }
}

function dismissResume() {
  document.getElementById('resume-banner').classList.remove('show');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Log toggle ────────────────────────────────────────────────────────────────
function toggleLog() {
  document.getElementById('log-panel').classList.toggle('collapsed');
}

// ── PWA Install ───────────────────────────────────────────────────────────────
let _deferredPrompt = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredPrompt = e;
  if (!localStorage.getItem('pwa_dismissed')) {
    document.getElementById('install-banner').classList.add('show');
  }
});

async function installPWA() {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  const result = await _deferredPrompt.userChoice;
  if (result.outcome === 'accepted') {
    toast('✓ جاري التثبيت...');
  }
  _deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
}

function dismissInstall() {
  document.getElementById('install-banner').classList.remove('show');
  localStorage.setItem('pwa_dismissed', '1');
}

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').classList.remove('show');
  toast('✓ تم تثبيت التطبيق');
});
</script>
